# --- Titles & notifications ---

# Let programs (like Claude) set the terminal title. tmux forwards it to
# Ghostty, so you see the title in the tab bar.
set -g set-titles on

# When a bell fires in ANY window (not just the current one), forward it to
# the outer terminal. This is what makes Ghostty's tab indicator light up
# when Claude finishes in a background window.
set -g monitor-bell on
set -g bell-action any

# Highlight windows in the status bar when they have new output you haven't
# seen yet. Switches off once you visit that window.
set -g monitor-activity on

# Status bar at top
set -g status-position top

# Show [Z] in status bar when zoomed
set -g status-right '#{?window_zoomed_flag,[Z] ,}%H:%M'

# --- External modules ---

# create an extra pane below the current and help scroll the original pane,
# useful when working with AI agents and you need to read through a lot of
# text and want to add comments as you read
source-file ~/.config/tmux-review/tmux.conf

# --- Keybindings ---

# 4-pane grid
bind G split-window -h \; split-window -v \; select-pane -t 0 \; split-window -v \; select-pane -t 0

# Kill to end of line (workaround: C-k is taken by vim-tmux-navigator)
bind k send-keys C-k

# vim-tmux-navigator: seamless Ctrl-h/j/k/l between vim and tmux panes
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
